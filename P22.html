<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fórmula General - x1 y x2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg1:#fff5f5;
      --bg2:#ffe4e6;
      --card:#ffffff;
      --primary:#b91c1c;
      --primary-dark:#7f1d1d;
      --accent:#ef4444;
      --text:#1f2937;
      --muted:#6b7280;
      --border:#fecaca;
      --shadow:0 18px 40px rgba(127,29,29,.12);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, #ffe4e6 0%, transparent 30%),
        radial-gradient(circle at bottom right, #fecaca 0%, transparent 28%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height:100vh;
    }

    .container{
      width:min(980px, 92%);
      margin:40px auto;
    }

    .hero{
      background:linear-gradient(135deg, #7f1d1d, #b91c1c 55%, #ef4444);
      color:white;
      border-radius:24px;
      padding:36px;
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
    }

    .hero::after{
      content:"";
      position:absolute;
      width:280px;
      height:280px;
      border-radius:50%;
      background:rgba(255,255,255,.12);
      top:-90px;
      right:-90px;
    }

    .badge{
      display:inline-block;
      padding:8px 14px;
      border:1px solid rgba(255,255,255,.3);
      border-radius:999px;
      font-size:14px;
      font-weight:700;
      background:rgba(255,255,255,.08);
      margin-bottom:14px;
    }

    h1{
      margin:0 0 10px;
      font-size:clamp(30px, 4vw, 46px);
      line-height:1.05;
    }

    .hero p{
      margin:0;
      max-width:760px;
      line-height:1.7;
      color:rgba(255,255,255,.92);
    }

    .card{
      margin-top:26px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:24px;
      padding:24px;
      box-shadow:var(--shadow);
    }

    .section-title{
      margin:0 0 18px;
      color:var(--primary-dark);
      font-size:24px;
    }

    .formula-box{
      background:#fff1f2;
      border:1px dashed #fda4af;
      border-radius:18px;
      padding:18px;
      margin-bottom:20px;
      color:#881337;
      font-weight:700;
      text-align:center;
      font-size:22px;
    }

    form{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
      gap:18px;
      align-items:end;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    label{
      font-weight:700;
      color:var(--primary-dark);
    }

    input{
      width:100%;
      padding:14px 16px;
      border-radius:16px;
      border:1px solid #fca5a5;
      background:#fff7f7;
      font:inherit;
      color:var(--text);
      outline:none;
      transition:border-color .18s ease, box-shadow .18s ease;
    }

    input:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 4px rgba(239,68,68,.12);
    }

    .buttons{
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      margin-top:20px;
    }

    button{
      border:none;
      border-radius:16px;
      padding:14px 18px;
      background:linear-gradient(135deg, var(--primary), var(--accent));
      color:white;
      font-family:inherit;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
      box-shadow:0 10px 22px rgba(185,28,28,.18);
      transition:transform .18s ease, box-shadow .18s ease;
    }

    button:hover{
      transform:translateY(-2px);
      box-shadow:0 14px 28px rgba(185,28,28,.22);
    }

    .secondary{
      background:linear-gradient(135deg, #991b1b, #dc2626);
    }

    .result-box{
      margin-top:22px;
      background:#fff1f2;
      border:1px dashed #fda4af;
      border-radius:20px;
      padding:18px;
    }

    .result-title{
      font-size:14px;
      color:var(--muted);
      margin-bottom:8px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.4px;
    }

    .result-value{
      font-size:22px;
      font-weight:800;
      color:#881337;
      line-height:1.5;
      white-space:pre-line;
    }

    .footer{
      text-align:center;
      color:#7f1d1d;
      margin:22px 0 10px;
      font-size:14px;
      font-weight:600;
    }

    code{
      background:#fee2e2;
      color:#991b1b;
      padding:2px 8px;
      border-radius:8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <div class="badge">HTML + JavaScript</div>
      <h1>Cálculo de la fórmula general</h1>
      <p>
        Captura los valores de <strong>a</strong>, <strong>b</strong> y <strong>c</strong> de una ecuación cuadrática
        y presiona el botón para calcular los valores de <strong>x1</strong> y <strong>x2</strong>.
      </p>
    </section>

    <section class="card">
      <h2 class="section-title">Formulario</h2>

      <div class="formula-box">
        x = (-b ± √(b² - 4ac)) / 2a
      </div>

      <form onsubmit="return false;">
        <div class="field">
          <label for="a">Valor de a</label>
          <input type="number" id="a" step="any" placeholder="Escribe el valor de a">
        </div>

        <div class="field">
          <label for="b">Valor de b</label>
          <input type="number" id="b" step="any" placeholder="Escribe el valor de b">
        </div>

        <div class="field">
          <label for="c">Valor de c</label>
          <input type="number" id="c" step="any" placeholder="Escribe el valor de c">
        </div>
      </form>

      <div class="buttons">
        <button type="button" onclick="calcularFormula()">Calcular x1 y x2</button>
        <button type="button" class="secondary" onclick="limpiarCampos()">Limpiar</button>
      </div>

      <div class="result-box">
        <div class="result-title">Resultado</div>
        <div class="result-value" id="resultado">Aquí aparecerán los valores de x1 y x2</div>
      </div>
    </section>

    <div class="footer">Archivo listo para usar</div>
  </div>

  <script>
    function calcularFormula() {
      let a = parseFloat(document.getElementById("a").value);
      let b = parseFloat(document.getElementById("b").value);
      let c = parseFloat(document.getElementById("c").value);

      if (isNaN(a) || isNaN(b) || isNaN(c)) {
        alert("Por favor, captura los valores de a, b y c.");
        document.getElementById("resultado").textContent = "Por favor, captura los valores de a, b y c.";
        return;
      }

      if (a === 0) {
        alert("El valor de 'a' no puede ser 0, porque dejaría de ser una ecuación cuadrática.");
        document.getElementById("resultado").textContent = "El valor de 'a' no puede ser 0.";
        return;
      }

      let discriminante = (b * b) - (4 * a * c);
      let mensaje = "";

      if (discriminante > 0) {
        let x1 = (-b + Math.sqrt(discriminante)) / (2 * a);
        let x2 = (-b - Math.sqrt(discriminante)) / (2 * a);
        mensaje = "x1 = " + x1 + "\nx2 = " + x2;
      } else if (discriminante === 0) {
        let x1 = (-b) / (2 * a);
        mensaje = "x1 = x2 = " + x1;
      } else {
        let parteReal = (-b / (2 * a)).toFixed(4);
        let parteImaginaria = (Math.sqrt(-discriminante) / (2 * a)).toFixed(4);
        mensaje = "x1 = " + parteReal + " + " + parteImaginaria + "i\n" +
                  "x2 = " + parteReal + " - " + parteImaginaria + "i";
      }

      document.getElementById("resultado").textContent = mensaje;
      alert(mensaje);
    }

    function limpiarCampos() {
      document.getElementById("a").value = "";
      document.getElementById("b").value = "";
      document.getElementById("c").value = "";
      document.getElementById("resultado").textContent = "Aquí aparecerán los valores de x1 y x2";
    }
  </script>
</body>
</html>
